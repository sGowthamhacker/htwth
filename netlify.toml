[[plugins]]
package = "netlify-plugin-cloudinary"

[build.environment]
  # Omit scanning for VITE_ prefixed variables as they are intentionally exposed to the client.
  # WARNING: VITE_DEFAULT_TOTP_SECRET is a secret and should not be exposed to the client.
  # Consider moving TOTP verification to a server-side function.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_EMAILJS_SERVICE_ID,VITE_EMAILJS_TEMPLATE_ID,VITE_CLOUDINARY_CLOUD_NAME,VITE_DEFAULT_TOTP_SECRET,VITE_SUPABASE_ANON_KEY,VITE_EMAILJS_PUBLIC_KEY"
